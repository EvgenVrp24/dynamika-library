<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.id} ? 'Редактирование книги' : 'Добавление книги'">Форма книги</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: body"></div>
<div class="container">
    <h2 th:text="${book.id} ? 'Редактировать книгу' : 'Добавить книгу'">Форма</h2>
    <form action="#" th:action="@{${book.id} ? '/books/edit/' + ${book.id} : '/books/add'}"
          th:object="${book}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Название</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required>
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
        </div>
        <div class="mb-3">
            <label for="author" class="form-label">Автор</label>
            <input type="text" class="form-control" id="author" th:field="*{author}" required>
            <div th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="text-danger"></div>
        </div>
        <div class="mb-3">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text" class="form-control" id="isbn" th:field="*{isbn}" required>
            <div th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="text-danger"></div>
        </div>
        <button type="submit" class="btn btn-success">Сохранить</button>
        <a href="/books" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
