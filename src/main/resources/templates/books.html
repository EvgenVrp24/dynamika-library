<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список книг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: body"></div>
<div class="container">
    <h2>Книги</h2>
    <a href="/books/add" class="btn btn-primary mb-3">Добавить книгу</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Автор</th>
            <th>ISBN</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${page.content}">
            <td th:text="${book.id}">1</td>
            <td th:text="${book.name}">Название</td>
            <td th:text="${book.author}">Автор</td>
            <td th:text="${book.isbn}">ISBN</td>
            <td>
                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-warning">Редактировать</a>
                <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${page.totalPages > 1}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/books(page=${page.number - 1})}">Предыдущая</a>
                </li>
                <li class="page-item disabled"><span class="page-link" th:text="${page.number + 1} + ' из ' + ${page.totalPages}"></span></li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/books(page=${page.number + 1})}">Следующая</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
