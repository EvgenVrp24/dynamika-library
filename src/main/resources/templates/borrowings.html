<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Выдачи книг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: body"></div>
<div class="container">
    <h2>Взять книгу</h2>
    <form th:action="@{/borrowings}" method="post" class="row g-3 mb-4">
        <div class="col-md-4">
            <label for="clientId" class="form-label">Клиент</label>
            <select id="clientId" name="clientId" class="form-select" required>
                <option value="">Выберите клиента</option>
                <option th:each="client : ${clients}"
                        th:value="${client.id}"
                        th:text="${client.fullName} + ' (' + ${#temporals.format(client.dateOfBirth, 'dd.MM.yyyy')} + ')'"></option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="bookId" class="form-label">Книга</label>
            <select id="bookId" name="bookId" class="form-select" required>
                <option value="">Выберите книгу</option>
                <option th:each="book : ${books}"
                        th:value="${book.id}"
                        th:text="${book.name} + ', ' + ${book.author} + ' (ISBN: ' + ${book.isbn} + ')'"></option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="borrowedDate" class="form-label">Дата выдачи</label>
            <input type="date" id="borrowedDate" name="borrowedDate" class="form-control"
                   th:value="${#temporals.format(today, 'yyyy-MM-dd')}" required/>
        </div>
        <div class="col-md-1 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Выдать</button>
        </div>
    </form>

    <hr/>
    <h2>Активные выдачи</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Клиент</th>
            <th>Дата рождения</th>
            <th>Книга</th>
            <th>Автор</th>
            <th>ISBN</th>
            <th>Дата выдачи</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${page.content}">
            <td th:text="${b.client.fullName}">Клиент</td>
            <td th:text="${#temporals.format(b.client.dateOfBirth, 'dd.MM.yyyy')}">01.01.1990</td>
            <td th:text="${b.book.name}">Книга</td>
            <td th:text="${b.book.author}">Автор</td>
            <td th:text="${b.book.isbn}">ISBN</td>
            <td th:text="${#temporals.format(b.borrowedDate, 'dd.MM.yyyy')}">01.01.2025</td>
            <td>
                <form th:action="@{/borrowings/delete/{id}(id=${b.id})}" method="post">
                    <button type="submit" class="btn btn-sm btn-danger">Вернуть книгу</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${page.totalPages > 1}">
        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/borrowings(page=${page.number - 1})}">Предыдущая</a>
                </li>
                <li class="page-item disabled"><span class="page-link" th:text="${page.number + 1} + ' из ' + ${page.totalPages}"></span></li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/borrowings(page=${page.number + 1})}">Следующая</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
