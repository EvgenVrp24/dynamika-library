<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${client.id} ? 'Редактирование клиента' : 'Добавление клиента'">Форма клиента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: body"></div>
<div class="container">
    <h2 th:text="${client.id} ? 'Редактировать клиента' : 'Добавить клиента'">Форма</h2>
    <form action="#" th:action="@{${client.id} ? '/clients/edit/' + ${client.id} : '/clients/add'}"
          th:object="${client}" method="post">
        <div class="mb-3">
            <label for="fullName" class="form-label">ФИО</label>
            <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
            <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger"></div>
        </div>
        <div class="mb-3">
            <label for="dateOfBirth" class="form-label">Дата рождения</label>
            <input type="date" class="form-control" id="dateOfBirth" th:field="*{dateOfBirth}" required>
            <div th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}" class="text-danger"></div>
        </div>
        <button type="submit" class="btn btn-success">Сохранить</button>
        <a href="/clients" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
