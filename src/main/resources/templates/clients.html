<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список клиентов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: body"></div>
<div class="container">
    <h2>Клиенты</h2>
    <a href="/clients/add" class="btn btn-primary mb-3">Добавить клиента</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>ФИО</th>
            <th>Дата рождения</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client : ${page.content}">
            <td th:text="${client.id}">1</td>
            <td th:text="${client.fullName}">ФИО</td>
            <td th:text="${#temporals.format(client.dateOfBirth, 'dd.MM.yyyy')}">01.01.1990</td>
            <td>
                <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="btn btn-sm btn-warning">Редактировать</a>
                <form th:action="@{/clients/delete/{id}(id=${client.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${page.totalPages > 1}">
        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/clients(page=${page.number - 1})}">Предыдущая</a>
                </li>
                <li class="page-item disabled"><span class="page-link" th:text="${page.number + 1} + ' из ' + ${page.totalPages}"></span></li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/clients(page=${page.number + 1})}">Следующая</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
